services:
  db:
    container_name: vutf_db
    image: postgres:15
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - vutf_db_data:/var/lib/postgresql/data

  redis:
    container_name: vutf_redis
    image: redis:7
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - vutf_redis_data:/data

  rabbitmq:
    container_name: vutf_rabbitmq
    image: rabbitmq:3-management
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "${RABBITMQ_PORT}:5672"           # AMQP port
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"  # Management UI port
    volumes:
      - vutf_rabbitmq_data:/var/lib/rabbitmq

  adminer:
    container_name: vutf_adminer
    image: adminer
    restart: always
    ports:
      - "${ADMINER_PORT}:8080"

  minio:
    container_name: vutf_minio
    image: minio/minio
    restart: always
    ports:
      - "${MINIO_PORT}:9000"     
      - "${MINIO_CONSOLE_PORT}:9001" 
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - vutf_minio_data:/data

volumes:
  vutf_db_data:
  vutf_redis_data:
  vutf_rabbitmq_data:
  vutf_minio_data: